<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LangChain SQL Agent</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
    <script src="https://cdn.jsdelivr.net/npm/vega@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-lite@5"></script>
    <script src="https://cdn.jsdelivr.net/npm/vega-embed@6"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 LangChain SQL Agent</h1>
            <p>Natural language to SQL queries with interactive charts</p>
        </header>

        <main>
            <div id="schema-banner" class="schema-banner hidden">
                <span id="schema-banner-text">Schema status unknown</span>
                <div class="schema-banner-actions">
                    <button id="btn-check-schema" class="btn btn-secondary btn-small" title="Compute live schema hash and flag if changed">Check Schema</button>
                    <button id="btn-rebuild-embeddings" class="btn btn-primary btn-small" title="Rebuild schema embeddings" disabled>Rebuild Embeddings</button>
                </div>
            </div>
            <section class="config-section">
                <h2>Configuration</h2>
                <div class="input-group">
                    <label for="db-uri">Database URI:</label>
                    <div class="input-row">
                        <input type="text" id="db-uri" placeholder="postgresql://user:pass@localhost:5432/db" value="">
                        <button id="test-connection-btn" class="btn btn-test">Test Connection</button>
                    </div>
                </div>
                <div id="test-connection-result" class="connection-status"></div>
                <div class="input-group">
                    <label for="model-select">Model:</label>
                    <div class="model-selection">
                        <select id="model-select" disabled>
                            <option value="">Loading models...</option>
                        </select>
                        <button id="refresh-models-btn" class="btn btn-refresh">🔄</button>
                    </div>
                </div>
            </section>

            <section class="query-section">
                <h2>Ask a Question</h2>
                <div class="input-group">
                    <label for="question">Natural Language Query:</label>
                    <textarea id="question" rows="3" placeholder="e.g., Show me the top 10 customers by revenue"></textarea>
                </div>

                <div class="button-group">
                    <button id="run-query" class="btn btn-primary">🔍 Run Query</button>
                    <button id="run-chart" class="btn btn-secondary">📊 Generate Chart</button>
                </div>
            </section>

            <section class="results-section">
                <div class="tabs">
                    <button class="tab-btn active" data-tab="sql">SQL Query</button>
                    <button class="tab-btn" data-tab="data">Data Results</button>
                    <button class="tab-btn" data-tab="chart">Chart</button>
                </div>

                <div class="tab-content">
                    <div id="sql-tab" class="tab-pane active">
                        <h3>Agent Answer</h3>
                        <pre><code id="answer-output">No answer yet.</code></pre>
                        <h3>SQL Query</h3>
                        <pre><code id="sql-output">No query executed yet.</code></pre>
                    </div>

                    <div id="data-tab" class="tab-pane">
                        <h3>Query Results</h3>
                        <pre><code id="data-output">No data available.</code></pre>
                    </div>

                    <div id="chart-tab" class="tab-pane">
                        <h3>Visualization</h3>
                        <div id="chart-output">No chart generated yet.</div>
                    </div>
                </div>
            </section>

            <section class="status-section">
                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <span>Processing...</span>
                </div>
                <div id="error" class="error hidden"></div>
            </section>
        </main>
    </div>

    <script type="module" src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
