services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-sqlagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sqlagent}
      SAMPLE_DATABASES: ${SAMPLE_DATABASES:-pagila,chinook,titanic,netflix,periodic_table,happiness_index}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sqlagent} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
      - ./postgres-sample-dbs:/sample-dbs:ro

  web:
    image: sql_agent:1.0
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      FLASK_ENV: production
      FLASK_DEBUG: "0"
      TRUST_PROXY_HEADERS: ${TRUST_PROXY_HEADERS:-0}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-deepseek/deepseek-chat}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-intfloat/e5-large-v2}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      DATABASE_OPTIONS: ${DATABASE_OPTIONS:-}
      SAMPLE_DATABASES: ${SAMPLE_DATABASES:-pagila,chinook,titanic,netflix,periodic_table,happiness_index}
      DEFAULT_DB_URI: postgresql+psycopg2://${POSTGRES_USER:-sqlagent}:${POSTGRES_PASSWORD:-sqlagent}@db:5432/${DEFAULT_SAMPLE_DB:-pagila}
    command:
      - gunicorn
      - --bind
      - 0.0.0.0:5000
      - --workers
      - ${GUNICORN_WORKERS:-2}
      - --threads
      - ${GUNICORN_THREADS:-4}
      - --timeout
      - ${GUNICORN_TIMEOUT:-240}
      - app:create_app()
    ports:
      - "5000:5000"
    volumes:
      - huggingface_cache:/app/.cache/huggingface

volumes:
  postgres_data:
  huggingface_cache:
